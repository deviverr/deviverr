<svg width="460" height="52" viewBox="0 0 460 52" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
  <style>
    .t { font-family: 'Courier New', monospace; }
    .blink { animation: bl 1.2s steps(2) infinite; }
    @keyframes bl { 50% { opacity: 0.3; } }
    .stripes { animation: mv 1.5s linear infinite; }
    @keyframes mv { from { transform: translateX(0); } to { transform: translateX(-24px); } }
  </style>
  <defs>
    <pattern id="cau" width="24" height="12" patternUnits="userSpaceOnUse" patternTransform="skewX(-30)">
      <rect width="12" height="12" fill="#FFB000"/>
      <rect x="12" width="12" height="12" fill="#1E1611"/>
    </pattern>
  </defs>
  <rect x="0" y="0" width="460" height="52" fill="#1E1611"/>
  <g class="stripes"><rect x="0" y="0" width="508" height="8" fill="url(#cau)"/></g>
  <g class="stripes"><rect x="0" y="44" width="508" height="8" fill="url(#cau)"/></g>
  <text x="230" y="32" text-anchor="middle" class="t blink" font-size="13" font-weight="bold" fill="#FFB000">&#9888; CAUTION: MEOW MOEW MEOW &#9888;</text>
</svg>
